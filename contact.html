<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Jia - Contact Me</title>
    <link rel="stylesheet" href="contact.css"> <!-- Link to external CSS -->
</head>

<body>

    <!-- Header and Navigation -->
    <header>
        <nav>
            <div class="logo">
                <h2>Jia</h2>
            </div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact Me</a>
                <a href="https://github.com/JesusIAlmada" target="_blank">GitHub</a>
            </div>
        </nav>
    </header>

    <!-- Contact Section -->
    <section>
        <h1>Contact Me</h1>
        <p>If you have any questions, feel free to reach out via email using this form.</p>
        
        <!-- Contact Form -->
        <form id="contactForm">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            
            <label for="message">Message:</label>
            <textarea id="message" maxlength="300" required></textarea>
            
            <p id="charCount">0/300 characters used</p>
            
            <button type="submit">Submit</button>
        </form>

        <!-- Success Message Popup -->
        <div id="popup" class="popup">
            <p>Your message has been sent!</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Jia. All rights not reserved.</p>
    </footer>

    <!-- Link to External JavaScript -->
    <script src="contact.js"></script>

</body>

</html>
