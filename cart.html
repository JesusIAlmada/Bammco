<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Your Cart - Bammco</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to external CSS -->

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f4a261;
        }

        .update-button {
            padding: 5px 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s; /* Smooth transition */
        }

        .update-button:hover {
            background-color: #f4a261; /* Change background on hover */
        }

        .total {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #333;
            color: white;
            margin-top: 20px;
        }

        /* Responsive styles */
        @media (max-width: 600px) {
            th, td {
                padding: 8px; /* Smaller padding for smaller screens */
            }

            .total {
                font-size: 16px; /* Slightly smaller total font size */
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Your Cart</h1>
    </header>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Product 1</td>
                    <td><input type="number" value="1" min="1" /></td>
                    <td>$10.00</td>
                    <td><button class="update-button">Update</button></td>
                </tr>
                <tr>
                    <td>Product 2</td>
                    <td><input type="number" value="2" min="1" /></td>
                    <td>$15.00</td>
                    <td><button class="update-button">Update</button></td>
                </tr>
                <!-- Add more products as needed -->
            </tbody>
        </table>
        <div class="total">Total: $40.00</div>
        <button class="update-button" style="margin-top: 20px;">Checkout</button>
    </div>

    <footer>
        <p>&copy; 2024 Bammco. All Rights Reserved.</p>
    </footer>
</body>

</html>
