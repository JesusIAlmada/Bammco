    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }

        nav {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 0 15px;
        }

        nav a:hover {
            color: #f4a261;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-container {
            display: flex; /* Change to flex for side-by-side layout */
            flex-wrap: wrap; /* Allow items to wrap if there's not enough space */
            gap: 20px; /* Space between items */
            justify-content: center; /* Center items */
            margin-top: 20px;
        }

        .product-item {
            border: 2px solid #fff; /* Border for the product item */
            border-radius: 5px;
            overflow: hidden; /* To clip inner content */
            transition: transform 0.3s;
            background-color: black;
            color: white;
            width: 250px; /* Set a fixed width for consistency */
            text-align: center; /* Center text */
        }

        .product-item:hover {
            transform: scale(1.05); /* Scale effect on hover */
        }

        .item-image {
            width: 100%;
            height: auto;
            border-bottom: 2px solid #fff; /* Separator between image and text */
        }

        .product-description {
            padding: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            position: relative; /* Change to relative */
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
