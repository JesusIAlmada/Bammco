<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Purchase Now - Bammco</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to external CSS -->

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px 0;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .form-group button:hover {
            background-color: #f4a261;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Finalize Payment (Only Accept NFTs)</h1>
    </header>

    <div class="container">
        <h2>Shipping Information</h2>
        <form action="purchase-confirmation.html" method="post">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required />
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required />
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required />
            </div>

            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" required />
            </div>

            <div class="form-group">
                <label for="zipcode">Zip Code</label>
                <input type="text" id="zipcode" name="zipcode" required />
            </div>

            <div class="form-group">
                <label for="payment">Payment Method</label>
                <select id="payment" name="payment" required>
                    <option value="nft">NFT</option>
                </select>
            </div>

            <div class="form-group">
                <label for="nftFile">NFT File (e.g., NFT.JPG)</label>
                <input type="text" id="nftFile" name="nftFile" required />
            </div>

            <div class="form-group">
                <label for="expiration">Expiration Date</label>
                <input type="text" id="expiration" name="expiration" placeholder="MM/YY" required />
            </div>

            <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" required />
            </div>

            <div class="form-group">
                <button type="submit">Purchase Now</button>
            </div>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 Bammco. All Rights Reserved.</p>
    </footer>

</body>

</html>
