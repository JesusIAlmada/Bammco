<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Product Details</title>
    <link rel="stylesheet" href="product-details.css">
</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <h2>Bammco</h2>
            </div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact Me</a>
                <a href="bammco.html">Bammco Products</a>
                <a href="https://github.com/JesusIAlmada" target="_blank">GitHub</a>
            </div>
        </nav>
    </header>

    <div class="container">
        <h1>Product Details</h1>
        <h2 id="product-name">Product Name</h2>
        <img id="product-image" class="item-image" src="" alt="Product Image">
        <p id="product-description">This is a detailed description of the product.</p>
        <a id="purchase-link" class="purchase-link" href="purchase.html">Purchase Now</a>
    </div>

    <script>
        // Define product data
        const productData = {
            Product1: {
                name: "Product 1",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQOsWmNVvwpSsHZc4r8dpXq4D4SAGg_26DNwISES6Z8iT8R9iMl",
                description: "Detailed description for Product 1.",
                purchaseLink: "purchase.html?product=Product1"
            },
            Product2: {
                name: "Product 2",
                image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQOsWmNVvwpSsHZc4r8dpXq4D4SAGg_26DNwISES6Z8iT8R9iMl",
                description: "Detailed description for Product 2.",
                purchaseLink: "purchase.html?product=Product2"
            },
            // Repeat similar blocks for other products
        };

        // Get product name from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('product');

        // Display product details
        if (productData[productName]) {
            const product = productData[productName];
            document.getElementById("product-name").textContent = product.name;
            document.getElementById("product-image").src = product.image;
            document.getElementById("product-description").textContent = product.description;
            document.getElementById("purchase-link").href = product.purchaseLink;
        } else {
            document.getElementById("product-description").textContent = "Product not found.";
        }
    </script>

</body>
</html>
