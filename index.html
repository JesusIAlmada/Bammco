<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Home - JIA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }

        nav {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 0 15px;
        }

        nav a:hover {
            color: #f4a261;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Responsive grid */
            gap: 20px;
            margin-top: 20px;
        }

        .product-item {
            border: 2px solid #fff; /* Border for the product item */
            border-radius: 5px;
            overflow: hidden; /* To clip inner content */
            transition: transform 0.3s;
        }

        .product-item:hover {
            transform: scale(1.05); /* Scale effect on hover */
        }

        .item-image {
            width: 100%;
            height: auto;
            border-bottom: 2px solid #fff; /* Separator between image and text */
        }

        .product-description {
            background-color: black;
            color: white;
            padding: 10px;
            text-align: center; /* Center text */
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .product-link {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background-color: black;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
        }

        .product-link:hover {
            background-color: #f4a261;
        }
    </style>
</head>
